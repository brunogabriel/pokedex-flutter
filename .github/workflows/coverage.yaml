name: Code Coverage Update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v1
        with:
          channel: "stable"
      
      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Install dependencies
        run: flutter pub get
        working-directory: pokedex
    
      - name: Run tests
        run: |
          # Generate a file that imports all lib sources so every file appears in coverage
          echo '// ignore_for_file: unused_import' > test/full_coverage_test.dart
          find lib -name '*.dart' | sort | while read f; do
            echo "import 'package:pokedex_flutter/${f#lib/}';" >> test/full_coverage_test.dart
          done
          echo 'void main() {}' >> test/full_coverage_test.dart

          flutter test --coverage
          lcov --remove coverage/lcov.info 'lib/generated/*' --output-file coverage/lcov.info --ignore-errors unused
        working-directory: pokedex

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
